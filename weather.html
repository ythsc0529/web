                                <div class="lang-dropdown">

        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme"></button>

    <main>
        <section class="page-header reveal">
            <div class="container">
                <h1 data-i18n="weather-title">專業氣象預報</h1>
                <p data-i18n="weather-tagline">「天氣，不只是預測。」</p>
                <div style="margin-top: 2rem;">
                    <a href="https://twforecast.netlify.app/" class="btn btn-primary" target="_blank" rel="noopener" data-i18n="ai-btn">立即體驗</a>
                </div>
            </div>
        </section>

        <div class="container">
            <section class="reveal">
                <p style="text-align: center; font-size: 1.25rem; max-width: 800px; margin: 0 auto;" data-i18n="weather-hero-desc">
                    我們打造全新的專業氣象預報軟體，結合中央氣象署的資料，讓資訊更可靠、更精準。
                </p>
            </section>

            <section class="reveal" style="margin-top: 4rem;">
                <div class="bento-grid">
                    <div class="card size-md">
                        <span class="card-category" data-i18n="core-value">功能亮點</span>
                        <h3 data-i18n="weather-f1-t">36 小時完整預報</h3>
                        <p data-i18n="weather-f1-d">清晰呈現未來一天半的天氣走向，無論晴雨，都能提前掌握。</p>
                    </div>
                    <div class="card">
                        <span class="card-category" data-i18n="exp-label">設計視覺</span>
                        <h3 data-i18n="weather-f2-t">動態動畫效果</h3>
                        <p data-i18n="weather-f2-d">以精緻的視覺化呈現，讓預報不只是數字，而是流動的體驗。</p>
                    </div>
                    <div class="card">
                        <span class="card-category" data-i18n="core-value">核心目標</span>
                        <h3 data-i18n="weather-f3-t">專業 × 直覺</h3>
                        <p data-i18n="weather-f3-d">簡單的操作，專業的資訊，每一次打開，都能安心出門。</p>
                    </div>
                </div>

            <div class="project-final-quote reveal" style="text-align: center; margin: 10rem 0;">
                <h2 style="font-size: 3rem;" data-i18n="weather-final-1">這不只是天氣軟體。</h2>
                <h2 class="highlight" style="font-size: 5rem; margin-top: -1rem;" data-i18n="weather-final-2">這是 氣象預報。</h2>
                <p style="font-size: 1.5rem; margin-top: 3rem;" data-i18n="weather-final-3">「因為天氣，值得更清晰。」</p>
