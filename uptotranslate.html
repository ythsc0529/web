        </header>

        <div class="container">
            <section class="reveal">

            </section>

            <section class="features-grid reveal" style="margin-top: 4rem;">
                <div class="card">
                    <h3 data-i18n="trans-f1-t">即時翻譯</h3>
                    <p data-i18n="trans-f1-d">跨越語言隔閡，每一句話都能被精準傳達。</p>
                </div>
                <div class="card">

                </div>
                <div class="card">
                    <h3 data-i18n="trans-f3-t">個人化體驗</h3>
                    <p data-i18n="trans-f3-d">Huson AI 了解你的習慣與需求，給予最貼近你的建議與解釋。</p>
                </div>
                <div class="card">
                    <h3 data-i18n="trans-f4-t">直覺設計</h3>
                    <p data-i18n="trans-f4-d">簡潔的介面、流暢的動畫，每一次操作，都是享受。</p>
                </div>
            </section>

            <div class="project-final-quote reveal" style="text-align: center; margin: 10rem 0;">
                <h2 style="font-size: 3rem;" data-i18n="trans-quote-1">這不只是翻譯。</h2>
                <h2 class="highlight" style="font-size: 5rem; margin-top: -1rem;" data-i18n="trans-quote-2">這是 懂你的翻譯。</h2>
                <p style="font-size: 1.5rem; margin-top: 3rem;" data-i18n="trans-quote-3">「因為語言，不該成為阻礙。」</p>
