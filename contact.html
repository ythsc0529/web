    <header class="navbar">
        <a href="index.html" class="logo" data-i18n="logo">隨便你工作室</a>

                    <button class="lang-dropbtn" aria-label="Select Language"></button>

                    </div>
                </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme"></button>
    </header>

    <main>
        <header class="page-header reveal">
            <div class="container">
                <h1 data-i18n="contact-title">聯絡我們</h1>
                <p data-i18n="contact-subtitle">有任何專案想法或合作需求？<br>歡迎隨時與我們聯繫！</p>
            </div>
        </header>

        <div class="container">
            <section class="reveal" style="padding-top: 0;">
                <div class="card" style="margin-bottom: 4rem; text-align: center;">
                    <span class="card-category" data-i18n="email-label">聯絡信箱</span>
                    <h3><a href="mailto:hsc0529.myself.tw@gmail.com" style="color: inherit; text-decoration: none;">hsc0529.myself.tw@gmail.com</a></h3>
                    <p style="margin-top: 1rem;" data-i18n="email-desc">我們的電子信箱，隨時為您敞開。</p>
                </div>

                <form class="contact-form">
                    <h2 style="text-align: center; margin-bottom: 2rem;" data-i18n="msg-title">或直接留言給我們</h2>
                    <input type="text" id="name" placeholder="您的稱呼" required>
                    <input type="email" id="email" placeholder="您的電子信箱" required>
                    <textarea id="message" placeholder="您的訊息" rows="6" required></textarea>
                    <div style="text-align: center;">
                        <button type="submit" class="btn btn-primary" data-i18n="btn-send">傳送訊息</button>
                    </div>
                </form>
            </section>
        </div>
    </main>
